<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retraite Mobile</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#060d18;color:white}
.header{padding:20px;text-align:center;font-size:24px;font-weight:bold}
.card{background:#101a2b;margin:12px;padding:16px;border-radius:18px}
input{width:100%;padding:14px;border-radius:12px;border:none;margin-top:8px;margin-bottom:14px;background:#1a2740;color:white;font-size:16px;box-sizing:border-box}
button{width:100%;padding:16px;border:none;border-radius:14px;background:#ff9800;color:white;font-size:18px;font-weight:bold}
.result{font-size:28px;font-weight:bold;color:#4caf50;text-align:center;margin-top:20px}
.small{opacity:.7;font-size:13px}
</style>
</head>
<body>
<div class="header">Simulateur Retraite Mobile</div>
<div class="card">
<div>Épargne actuelle</div>
<input id="capital" type="number" value="500000">
<div>Cotisation mensuelle</div>
<input id="mensuel" type="number" value="10400">
<div>Taux annuel (%)</div>
<input id="taux" type="number" value="6">
<div>Âge retraite</div>
<input id="retraite" type="number" value="63">
<div>Âge actuel</div>
<input id="actuel" type="number" value="40">
<button onclick="calculer()">Calculer</button>
<div class="result" id="resultat">0 MAD</div>
<div class="small">Optimisé mobile iPhone</div>
</div>
<script>
function calculer(){
const capital=parseFloat(document.getElementById('capital').value)||0;
const mensuel=parseFloat(document.getElementById('mensuel').value)||0;
const taux=(parseFloat(document.getElementById('taux').value)||0)/100;
const retraite=parseFloat(document.getElementById('retraite').value)||0;
const actuel=parseFloat(document.getElementById('actuel').value)||0;
const annees=retraite-actuel;
const mois=annees*12;
const tauxMensuel=taux/12;
let future=capital*Math.pow(1+tauxMensuel,mois);
for(let i=0;i<mois;i++){future+=mensuel*Math.pow(1+tauxMensuel,mois-i);}
document.getElementById('resultat').innerHTML=Math.round(future).toLocaleString('fr-FR')+' MAD';
}
calculer();
</script>
</body>
</html>
