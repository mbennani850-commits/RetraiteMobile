// ─────────────────────────────────────────────────

const SK = 'retraite_v4';
const MOIS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const TODAY = new Date();
const NOW_Y = TODAY.getFullYear();
const NOW_M = TODAY.getMonth();
const PREV = new Date(TODAY.getFullYear(), TODAY.getMonth()-1, 1);
const PREV_Y = PREV.getFullYear();
const PREV_M = PREV.getMonth();
// Cotisations REC démarrent avril 2026
const REF_Y = 2026, REF_M = 3;

// ─────────────────────────────────────────────────

// ─────────────────────────────────────────────────
const S = {

  btnSm: (c)=>({display:'inline-flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:6,border:`1px solid ${c}40`,cursor:'pointer',fontSize:11,fontWeight:600,background:'transparent',color:c}),

  scCap: (c)=>({fontSize:15,fontWeight:700,color:c,fontVariantNumeric:'tabular-nums'}),
  scPen: {fontSize:10,color:'#64748b',marginTop:2},

  sumRow: {display:'flex',justifyContent:'space-between',fontSize:12,padding:'6px 0',borderBottom:'1px solid #1e3a5f'},
  sumLbl: {color:'#64748b'},

  toast: (show)=>({
    position:'fixed',bottom:24,left:'50%',transform:`translateX(-50%) translateY(${show?0:8}px)`,
    background:'#0d1829',color:'#e2e8f0',border:'1px solid #1e3a5f',

    opacity:show?1:0,transition:'all .25s',pointerEvents:'none',zIndex:9999,whiteSpace:'nowrap',
  }),

// ─────────────────────────────────────────────────
// FINANCE
// ─────────────────────────────────────────────────
const fvLump = (pv,r,t) => t<=0 ? pv : pv*Math.pow(1+r,t);
const fvAnnuity = (pmt,r,freq,years) => {
  if(!pmt||years<=0) return 0;
  if(r===0) return pmt*freq*years;
  const rp=r/freq, n=freq*years;
  return pmt*(Math.pow(1+rp,n)-1)/rp;
};
const isPast = (y,m) => y<NOW_Y || (y===NOW_Y && m<=NOW_M);
const isNow  = (y,m) => y===NOW_Y && m===NOW_M;
const monthIndex = (y,m) => y*12+m;
const clampLastEncaisse = (y,m) => {
  const max = monthIndex(NOW_Y,NOW_M);
  const min = monthIndex(REF_Y,REF_M);
  const v = Math.min(Math.max(monthIndex(y,m),min),max);
  return {y:Math.floor(v/12),m:v%12};
};

const fmt = n => {
  if(n===null||n===undefined||isNaN(n)) return '—';
  if(Math.abs(n)>=1e6) return (n/1e6).toFixed(2).replace('.',',')+' M MAD';
  return Math.round(n).toLocaleString('fr-FR')+' MAD';
};
const fmtS = n => {
  if(!n&&n!==0) return '—';
  if(Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+'M';
  if(Math.abs(n)>=1e3) return Math.round(n/1e3)+'k';
  return Math.round(n)+'';
};

// ─────────────────────────────────────────────────
// GÉNÈRE ROWS REC
// ─────────────────────────────────────────────────
function genRcRows(retY, defCotis, defExcep, existing={}) {
  const rows=[];
  let y=REF_Y, m=REF_M;
  while(y<retY) {
    const key=`${y}-${m}`;
    const past=isPast(y,m);
    rows.push(existing[key] || {
      y,m,
      cotis: past ? 10400 : defCotis,
      excep: past ? 0 : (m===0 ? defExcep : 0),
      pastLocked: past,
    });
    m++; if(m===12){m=0;y++;}
  }
  return rows;
}

// ─────────────────────────────────────────────────
// CALCUL REC
// ─────────────────────────────────────────────────
function calcRc(rcRows, rcR, retY) {
  const rm=rcR/12;
  let pastCVF=0,futCVF=0,pastEVF=0,futEVF=0;
  let pastCBrut=0,futCBrut=0;
  rcRows.forEach(r=>{
    const yl=(retY-r.y)-r.m/12;
    const ml=Math.round(yl*12);
    const fM=Math.pow(1+rm,Math.max(0,ml));
    const fY=Math.pow(1+rcR,Math.max(0,yl));
    if(r.pastLocked){pastCVF+=r.cotis*fM;pastEVF+=r.excep*fY;pastCBrut+=r.cotis;}
    else{futCVF+=r.cotis*fM;futEVF+=r.excep*fY;futCBrut+=r.cotis;}
  });
  return {pastCVF,futCVF,pastEVF,futEVF,pastCBrut,futCBrut};
}


function calcRcNow(rcCap, rcRows, rcR) {
  const rm=rcR/12;
  const startMi=monthIndex(REF_Y,REF_M);
  const nowMi=monthIndex(NOW_Y,NOW_M);
  const monthsSinceArrete=Math.max(0,nowMi-startMi);
  let capVF=rcCap*Math.pow(1+rm,monthsSinceArrete);
  let cotisVF=0, excepVF=0, cotisBrut=0, excepBrut=0;
  rcRows.forEach(r=>{
    const mi=monthIndex(r.y,r.m);
    // Épargne actuelle = toutes les cotisations encaissées jusqu'au mois courant inclus.
    if(mi>nowMi) return;
    const monthsToNow=Math.max(0,nowMi-mi);
    cotisVF += (r.cotis||0)*Math.pow(1+rm,monthsToNow);
    excepVF += (r.excep||0)*Math.pow(1+rm,monthsToNow);
    cotisBrut += r.cotis||0;
    excepBrut += r.excep||0;
  });
  return {capVF,cotisVF,excepVF,cotisBrut,excepBrut,total:capVF+cotisVF+excepVF};
}

function calcVersVF(vers,r,retY) {
  let vf=0;
  vers.forEach(v=>{
    if(v.montant<=0) return;
    const t=(retY-v.year)-v.month/12;
    if(t>0) vf+=v.montant*Math.pow(1+r,t);
  });
  return vf;
}

function calcCotisEncaisseesNow(pmt,r,freq,lastY,lastM) {
  if(!pmt||pmt<=0) return {vf:0,brut:0,nb:0};
  const last=clampLastEncaisse(lastY,lastM);
  const start=monthIndex(REF_Y,REF_M); // avril 2026, après arrêté 31/03/2026
  const end=monthIndex(last.y,last.m);
  const step=Math.max(1,Math.round(12/freq));
  const rm=r/12;
  let vf=0, brut=0, nb=0;
  for(let mi=start; mi<=end; mi+=step){
    const y=Math.floor(mi/12), m=mi%12;
    const monthsToNow=Math.max(0,monthIndex(NOW_Y,NOW_M)-mi);
    vf += pmt*Math.pow(1+rm,monthsToNow);
    brut += pmt; nb++;
  }
  return {vf,brut,nb};
}

function calcVersNow(vers,r) {
  const rm=r/12;
  let vf=0, brut=0;
  vers.forEach(v=>{
    if(v.montant<=0) return;
    const mi=monthIndex(v.year,v.month);
    if(mi>monthIndex(NOW_Y,NOW_M)) return;
    const monthsToNow=Math.max(0,monthIndex(NOW_Y,NOW_M)-mi);
    vf += v.montant*Math.pow(1+rm,monthsToNow);
    brut += v.montant;
  });
  return {vf,brut};
}


function fvRecurring(amount,r,freq,years) {
  if(!amount || amount<=0 || years<=0 || freq<=0) return 0;
  const rp=r/freq, n=Math.floor(freq*years);
  if(n<=0) return 0;
  if(r===0) return amount*n;
  return amount*(Math.pow(1+rp,n)-1)/rp;
}

function pensionTo85(capital, annualRatePct, targetYear, currentAge) {
  const ageAtRet = (currentAge || 40) + (targetYear - NOW_Y);
  const yearsPay = Math.max(1, 85 - ageAtRet);
  const n = Math.max(1, Math.round(yearsPay * 12));
  const i = ((annualRatePct || 0) / 100) / 12;
  if (i === 0) return (capital || 0) / n;
  return (capital || 0) * i / (1 - Math.pow(1 + i, -n));
}

function calcSim(current, monthly, exceptional, exFreq, ratePct, targetYear, currentAge) {
  const years=Math.max(0,targetYear - (NOW_Y + NOW_M/12));
  const r=(ratePct||0)/100;
  const cap=fvLump(current||0,r,years);
  const cot=fvRecurring(monthly||0,r,12,years);
  const ex=fvRecurring(exceptional||0,r,parseInt(exFreq)||1,years);
  const total=cap+cot+ex;
  return {cap,cot,ex,total,pen:pensionTo85(total, ratePct||0, targetYear, currentAge)};
}

function getAnnualSeries(state) {
  const {retY,rcR,atlR,ucR,rcRows,atlVers,ucVers,atlCotis,atlFreq,ucCotis,ucFreq,rcCap,atlCap,ucCap} = state;
  const rm=rcR/12;
  const years=[],rcV=[],atlV=[],ucV=[];
  for(let y=REF_Y;y<=retY;y++){
    const t=y-REF_Y;
    // RC
    let rv=fvLump(rcCap,rcR,t);
    rcRows.forEach(r=>{
      if(r.y>y) return;
      const ml=Math.max(0,(y-r.y)*12-r.m);
      rv+=r.cotis*Math.pow(1+rm,ml);
      if(r.excep>0){const te=(y-r.y)-r.m/12;if(te>0)rv+=r.excep*Math.pow(1+rcR,te);}
    });
    // ATL
    let av=fvLump(atlCap,atlR,t)+fvAnnuity(atlCotis,atlR,atlFreq,t);
    atlVers.forEach(v=>{if(v.montant>0&&v.year<=y){const te=(y-v.year)-v.month/12;if(te>0)av+=v.montant*Math.pow(1+atlR,te);}});
    // UC
    let uv=fvLump(ucCap,ucR,t)+fvAnnuity(ucCotis,ucR,ucFreq,t);
    ucVers.forEach(v=>{if(v.montant>0&&v.year<=y){const te=(y-v.year)-v.month/12;if(te>0)uv+=v.montant*Math.pow(1+ucR,te);}});
    years.push(y); rcV.push(Math.max(0,rv)); atlV.push(Math.max(0,av)); ucV.push(Math.max(0,uv));
  }
  return {years,rcV,atlV,ucV};
}

// ─────────────────────────────────────────────────

      <input type="range" style={{...S.range,accentColor:color}} min={min} max={max} step={step} value={value}
        onChange={e=>onChange(parseFloat(e.target.value))} />
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#475569',marginTop:2}}>
        <span>{min}%</span><span>{max}%</span>
      </div>
    </div>
  );
}

function MiniChart({series,color}) {
  const max=Math.max(...series.map(s=>s.val),1);
  return (
    <div style={S.chart}>
      {series.map((s,i)=>(
        <div key={i} style={S.bar((s.val/max)*110,color,i===series.length-1?1:.4)} title={fmtS(s.val)} />
      ))}
    </div>
  );
}

function DecompRow({label,val,color,bold}) {
  return (
    <div style={{...S.drRow,borderBottom:bold?'none':'1px solid #1e3a5f',paddingTop:bold?10:8}}>

      <span style={{...S.drVal,color:color||'#e2e8f0',fontSize:bold?15:13}}>{val}</span>
    </div>
  );
}

function VersTable({vers,color,onAdd,onRemove,retY}) {
  const [newM,setNewM]=useState(0);
  const [newY,setNewY]=useState(NOW_Y);
  const [newAmt,setNewAmt]=useState('');
  const years=[];
  for(let y=NOW_Y;y<retY;y++) years.push(y);

  const add=()=>{
    const amt=parseFloat(newAmt);
    if(!amt||amt<=0) return;
    onAdd({id:Date.now(),month:newM,year:newY,montant:amt});
    setNewAmt('');
  };

  return (
    <div>
      {vers.length===0
        ? <div style={{fontSize:12,color:'#475569',padding:'8px 0'}}>Aucun versement — ajoutez ci-dessous</div>
        : <table style={S.table}>
            <thead><tr>
              <th style={S.th}>Mois</th>
              <th style={S.th}>Année</th>
              <th style={{...S.th,textAlign:'right'}}>Montant</th>
              <th style={S.th}></th>
            </tr></thead>
            <tbody>
              {vers.map(v=>(
                <tr key={v.id}>
                  <td style={S.td}><span style={{fontWeight:500}}>{MOIS[v.month]}</span></td>
                  <td style={S.td}>{v.year}</td>
                  <td style={{...S.td,textAlign:'right',fontWeight:600,color}}>{fmt(v.montant)}</td>
                  <td style={S.td}><button style={S.btnDel} onClick={()=>onRemove(v.id)}>×</button></td>
                </tr>
              ))}
            </tbody>
          </table>
      }
      <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap',alignItems:'flex-end'}}>
        <div>
          <div style={S.label}>Mois</div>
          <select style={{...S.tselect,width:70}} value={newM} onChange={e=>setNewM(parseInt(e.target.value))}>
            {MOIS.map((mn,mi)=><option key={mi} value={mi}>{mn}</option>)}
          </select>
        </div>
        <div>
          <div style={S.label}>Année</div>
          <select style={{...S.tselect,width:80}} value={newY} onChange={e=>setNewY(parseInt(e.target.value))}>
            {years.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div style={{flex:1,minWidth:120}}>
          <div style={S.label}>Montant (MAD)</div>
          <input style={S.tinput} type="number" placeholder="Ex: 100 000" value={newAmt}
            onChange={e=>setNewAmt(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&add()} />
        </div>
        <button style={{...S.btnSm(color),alignSelf:'flex-end',padding:'7px 12px'}} onClick={add}>+ Ajouter</button>
      </div>
      {vers.length>0 && (
        <div style={{marginTop:8,fontSize:11,color:'#64748b'}}>
          Total brut : <b style={{color}}>{fmt(vers.reduce((s,v)=>s+v.montant,0))}</b>
        </div>
      )}
    </div>
  );
}

const TABS = [
  {id:'horizon',  label:'Horizon',  color:'#64748b'},
  {id:'rec',   label:'REC',   color:'#f97316'},
  {id:'atlanta',  label:'ATL',  color:'#22c55e'},
  {id:'uc',       label:'UC',       color:'#38bdf8'},
  {id:'simulation',label:'Simulation',color:'#94a3b8'},
  {id:'projection',label:'Projection',color:'#a78bfa'},
];

const DEFAULT_STATE = {
  retYear: 2035,
  currentAge: 40,
  rcCap: 689000,   rcRdmt: 1,    rcDefCotis: 10400, rcDefExcep: 0,
  atlCap: 721400,  atlRdmt: 3.6, atlCotis: 0, atlFreq: 12, atlLastM: PREV_M, atlLastY: PREV_Y,
  ucCap: 0,        ucRdmt: 7,    ucCotis: 0,  ucFreq: 12, ucLastM: PREV_M, ucLastY: PREV_Y,
  atlVers: [], ucVers: [],
  rcRows: [],
  sim: {
    rc:{monthly:10400, exceptional:0, exFreq:1, rate:null},
    atl:{monthly:0, exceptional:0, exFreq:1, rate:null},
    uc:{monthly:0, exceptional:0, exFreq:1, rate:null}
  },
};

function load() {
  try {
    const raw = localStorage.getItem(SK);
    if(raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function App() {
  const [tab, setTab] = useState('horizon');
  const [toast, setToast] = useState({show:false,msg:''});
  const [savedAt, setSavedAt] = useState('');

  // State
  const saved = load();
  const init = saved || DEFAULT_STATE;

  const [retYear,  setRetYear]  = useState(init.retYear);
  const [currentAge,setCurrentAge]= useState(init.currentAge ?? 40);
  const [rcCap,    setRcCap]    = useState(init.rcCap);
  const [rcRdmt,   setRcRdmt]   = useState(init.rcRdmt);
  const [rcDefCotis,setRcDefCotis]=useState(init.rcDefCotis);
  const [rcDefExcep,setRcDefExcep]=useState(init.rcDefExcep);
  const [atlCap,   setAtlCap]   = useState(init.atlCap);
  const [atlRdmt,  setAtlRdmt]  = useState(init.atlRdmt);
  const [atlCotis, setAtlCotis] = useState(init.atlCotis);
  const [atlFreq,  setAtlFreq]  = useState(init.atlFreq);
  const [atlLastM, setAtlLastM] = useState(init.atlLastM ?? PREV_M);
  const [atlLastY, setAtlLastY] = useState(init.atlLastY ?? PREV_Y);
  const [atlVers,  setAtlVers]  = useState(init.atlVers||[]);
  const [ucCap,    setUcCap]    = useState(init.ucCap);
  const [ucRdmt,   setUcRdmt]   = useState(init.ucRdmt);
  const [ucCotis,  setUcCotis]  = useState(init.ucCotis);
  const [ucFreq,   setUcFreq]   = useState(init.ucFreq);
  const [ucLastM,  setUcLastM]  = useState(init.ucLastM ?? PREV_M);
  const [ucLastY,  setUcLastY]  = useState(init.ucLastY ?? PREV_Y);
  const [ucVers,   setUcVers]   = useState(init.ucVers||[]);
  const [rcRows,   setRcRows]   = useState(()=>{
    if(init.rcRows && init.rcRows.length) {
      const ex={};
      init.rcRows.forEach(r=>ex[`${r.y}-${r.m}`]=r);
      return genRcRows(init.retYear,init.rcDefCotis,init.rcDefExcep,ex);
    }
    return genRcRows(init.retYear,init.rcDefCotis,init.rcDefExcep);
  });

  const [sim, setSim] = useState(init.sim || DEFAULT_STATE.sim);
  const updateSim = (key, field, val) => setSim(prev=>({
    ...prev,
    [key]: {...(prev[key]||{}), [field]: val}
  }));

  // Rebuild rcRows when retYear / defaults change
  const rebuildRows = useCallback((rY,dc,de,existing)=>{
    const ex={};
    existing.forEach(r=>ex[`${r.y}-${r.m}`]=r);
    setRcRows(genRcRows(rY,dc,de,ex));
  },[]);

  // Auto-save
  useEffect(()=>{
    const state={
      retYear,currentAge,rcCap,rcRdmt,rcDefCotis,rcDefExcep,
      atlCap,atlRdmt,atlCotis,atlFreq,atlLastM,atlLastY,atlVers,
      ucCap,ucRdmt,ucCotis,ucFreq,ucLastM,ucLastY,ucVers,rcRows,sim
    };
    try {
      localStorage.setItem(SK,JSON.stringify(state));
      const now=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
      setSavedAt('Sauvegardé à '+now);
    } catch(e){}
  },[retYear,currentAge,rcCap,rcRdmt,rcDefCotis,rcDefExcep,atlCap,atlRdmt,atlCotis,atlFreq,atlLastM,atlLastY,atlVers,ucCap,ucRdmt,ucCotis,ucFreq,ucLastM,ucLastY,ucVers,rcRows,sim]);

  const showToast = msg => { setToast({show:true,msg}); setTimeout(()=>setToast({show:false,msg:''}),2000); };

  // Calculs
  const rcR=rcRdmt/100, atlR=atlRdmt/100, ucR=ucRdmt/100;
  const tBase=Math.max(0,retYear-REF_Y);
  const {pastCVF,futCVF,pastEVF,futEVF,pastCBrut,futCBrut}=calcRc(rcRows,rcR,retYear);
  const rcInitVF=fvLump(rcCap,rcR,tBase);
  const rcTotal=rcInitVF+pastCVF+futCVF+pastEVF+futEVF;
  const rcPen=pensionTo85(rcTotal, rcRdmt, retYear, currentAge);
  const rcNow=calcRcNow(rcCap,rcRows,rcR);
  const rcCurrent=rcNow.total;

  const atlInitVF=fvLump(atlCap,atlR,tBase);
  const atlCotisVF=fvAnnuity(atlCotis,atlR,atlFreq,tBase);
  const atlExcepVF=calcVersVF(atlVers,atlR,retYear);
  const atlTotal=atlInitVF+atlCotisVF+atlExcepVF;
  const atlPen=pensionTo85(atlTotal, atlRdmt, retYear, currentAge);
  const atlCotisNow=calcCotisEncaisseesNow(atlCotis,atlR,atlFreq,atlLastY,atlLastM);
  const atlVersNow=calcVersNow(atlVers,atlR);
  const atlCurrent=atlCap+atlCotisNow.vf+atlVersNow.vf;

  const ucInitVF=fvLump(ucCap,ucR,tBase);
  const ucCotisVF=fvAnnuity(ucCotis,ucR,ucFreq,tBase);
  const ucExcepVF=calcVersVF(ucVers,ucR,retYear);
  const ucTotal=ucInitVF+ucCotisVF+ucExcepVF;
  const ucPen=pensionTo85(ucTotal, ucRdmt, retYear, currentAge);
  const ucCotisNow=calcCotisEncaisseesNow(ucCotis,ucR,ucFreq,ucLastY,ucLastM);
  const ucVersNow=calcVersNow(ucVers,ucR);
  const ucCurrent=ucCap+ucCotisNow.vf+ucVersNow.vf;

  const totCap=rcTotal+atlTotal+ucTotal;
  const totCurrent=rcCurrent+atlCurrent+ucCurrent;
  const totPen=rcPen+atlPen+ucPen;


  const simContracts = [
    {key:'rc', label:'REC', color:'#f97316', current:rcCurrent, baseRate:rcRdmt},
    {key:'atl', label:'ATL', color:'#22c55e', current:atlCurrent, baseRate:atlRdmt},
    {key:'uc', label:'ATL UC', color:'#38bdf8', current:ucCurrent, baseRate:ucRdmt},
  ].map(c=>({
    ...c,
    monthly: sim?.[c.key]?.monthly ?? (c.key==='rc'?10400:0),
    exceptional: sim?.[c.key]?.exceptional ?? 0,
    exFreq: sim?.[c.key]?.exFreq ?? 1,
    rate: sim?.[c.key]?.rate ?? c.baseRate,
  }));
  const simYears=[2035,2040,2045];
  const simTotals=simYears.map(y=>simContracts.reduce((sum,c)=>sum+calcSim(c.current,c.monthly,c.exceptional,c.exFreq,c.rate,y,currentAge).total,0));
  const simPens=simYears.map((y,i)=>simContracts.reduce((sum,c)=>{const r=calcSim(c.current,c.monthly,c.exceptional,c.exFreq,c.rate,y,currentAge);return sum+r.pen;},0));

  const annualSeries=useMemo(()=>getAnnualSeries({retY:retYear,rcR,atlR,ucR,rcRows,atlVers,ucVers,atlCotis,atlFreq,ucCotis,ucFreq,rcCap,atlCap,ucCap}),[retYear,rcR,atlR,ucR,rcRows,atlVers,ucVers,atlCotis,atlFreq,ucCotis,ucFreq,rcCap,atlCap,ucCap]);

  // Handlers versements
  const addAtlVers = v => setAtlVers(prev=>[...prev,v].sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month));
  const remAtlVers = id => setAtlVers(prev=>prev.filter(v=>v.id!==id));
  const addUcVers  = v => setUcVers(prev=>[...prev,v].sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month));
  const remUcVers  = id => setUcVers(prev=>prev.filter(v=>v.id!==id));

  // Modif row RC
  const updateRcRow = (i,field,val) => {
    setRcRows(prev=>{const n=[...prev];n[i]={...n[i],[field]:val};return n;});
  };

  const retYearChange = val => {
    setRetYear(val);
    rebuildRows(val,rcDefCotis,rcDefExcep,rcRows);
  };
  const applyFutureCotis = val => {
    setRcDefCotis(val);
    setRcRows(prev=>prev.map(r=>r.pastLocked?r:{...r,cotis:val}));
  };
  const applyFutureExcep = val => {
    setRcDefExcep(val);
    setRcRows(prev=>prev.map(r=>r.pastLocked?r:{...r,excep:r.m===0?val:r.excep}));
  };

  const years_left = retYear - NOW_Y;

  // ── RENDER ──
  const encaisseYears=[];
  for(let y=REF_Y;y<=NOW_Y;y++) encaisseYears.push(y);

  return (
    <div style={S.app}>

      {/* HEADER */}
      <div style={S.header}>
        <div style={S.headerLeft}>
          <div style={S.eyebrow}>Planification financière</div>
          <div style={S.h1}>Simulateur Retraite</div>
          <div style={{...S.savedBadge}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',display:'inline-block'}}></span>
            {savedAt||'Chargement…'}
          </div>
        </div>
        <div style={S.liveBox}>
          <div style={S.liveLbl}>Épargne globale actuelle</div>
          <div style={S.liveVal}>{fmt(totCurrent)}</div>
          <div style={S.liveSub}>Retraite {fmt(totCap)} · Pension {fmt(totPen)}/mois</div>
        </div>
      </div>

      {/* TABS */}
      <div style={S.tabs}>
        {TABS.map(t=>(
          <button key={t.id} style={S.tab(tab===t.id,t.color)} onClick={()=>setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── HORIZON ── */}
      {tab==='horizon' && (
        <div className="fade">
          <div style={S.card}>
            <div style={S.cardTitle}><span style={S.dot('#64748b')}></span>Date de départ</div>
            <div style={S.field}>
              <label style={S.label}>Année de retraite</label>
              <select style={S.select} value={retYear} onChange={e=>retYearChange(parseInt(e.target.value))}>
                {[2030,2031,2032,2033,2034,2035,2036,2037,2038,2040,2042,2045].map(y=>(
                  <option key={y} value={y}>{y}</option>
                ))}
              </select>
            </div>
            <div style={{padding:'8px 0'}}>
              <div style={{fontSize:10,letterSpacing:'0.1em',textTransform:'uppercase',color:'#64748b',marginBottom:4}}>Années restantes</div>
              <div style={{fontSize:36,fontWeight:700,color:'#f97316'}}>{years_left} ans</div>
            </div>
          </div>

          <div style={S.card}>
            <div style={S.cardTitle}><span style={S.dot('#a78bfa')}></span>Résumé global</div>
            <div style={S.resultBanner('#a78bfa')}>
              <div><div style={S.rLbl}>Épargne globale actuelle</div><div style={S.rVal('#c4b5fd')}>{fmt(totCurrent)}</div></div>
              <div><div style={S.rLbl}>Capital futur retraite</div><div style={S.rVal('#a78bfa')}>{fmt(totCap)}</div></div>
              <div><div style={S.rLbl}>Pension mensuelle</div><div style={S.rVal('#c4b5fd')}>{fmt(totPen)}/mois</div></div>
            </div>
            <DecompRow label="Actuel REC" val={fmt(rcCurrent)} color="#f97316" />
            <DecompRow label="Actuel ATL" val={fmt(atlCurrent)} color="#22c55e" />
            <DecompRow label="Actuel ATL UC" val={fmt(ucCurrent)} color="#38bdf8" />
            <DecompRow label="Pension REC" val={fmt(rcPen)+'/mois'} color="#f97316" />
            <DecompRow label="Pension ATL" val={fmt(atlPen)+'/mois'} color="#22c55e" />
            <DecompRow label="Pension ATL UC" val={fmt(ucPen)+'/mois'} color="#38bdf8" />
          </div>
          <div style={S.card}>
            <div style={S.cardTitle}><span style={S.dot('#64748b')}></span>Pension : consommation du capital jusqu’à 85 ans</div>
            <div style={S.field}>
              <label style={S.label}>Âge actuel</label>
              <input style={S.input} type="number" value={currentAge} onChange={e=>setCurrentAge(parseInt(e.target.value)||40)} />
            </div>
            <div style={{...S.ibox,marginTop:12}}>
              La pension mensuelle est calculée comme un décaissement progressif du capital entre l’année de retraite et l’âge de 85 ans, avec rendement pendant la phase de retrait.
            </div>
          </div>
          <div style={S.navRow}>
            <div></div>
            <button style={S.btn('#f97316')} onClick={()=>setTab('rec')}>Suivant — REC →</button>
          </div>
        </div>
      )}

      {/* ── REC ── */}
      {tab==='rec' && (
        <div className="fade">
          <div style={S.resultBanner('#f97316')}>
            <div><div style={S.rLbl}>Épargne actuelle estimée</div><div style={S.rVal('#fbbf24')}>{fmt(rcCurrent)}</div></div>
            <div><div style={S.rLbl}>Capital REC à la retraite</div><div style={S.rVal('#f97316')}>{fmt(rcTotal)}</div></div>
            <div><div style={S.rLbl}>Rente mensuelle</div><div style={S.rVal('#fbbf24')}>{fmt(rcPen)}/mois</div></div>
          </div>

          <div style={S.grid2}>
            <div>
              <div style={S.card}>
                <div style={S.cardTitle}><span style={S.dot('#f97316')}></span>Capital & rendement</div>
                <div style={S.field}>
                  <label style={S.label}>Valeur au 31 mars 2026 (MAD)</label>
                  <input style={S.input} type="number" value={rcCap} onChange={e=>setRcCap(parseFloat(e.target.value)||0)} />
                </div>
                <Range min={0} max={12} step={0.25} value={rcRdmt} onChange={setRcRdmt} color="#f97316" label="Rendement annuel" />
              </div>

              <div style={S.card}>
                <div style={S.cardTitle}><span style={S.dot('#f97316')}></span>Simulation future</div>
                <div style={{...S.ibox}}>Les mois passés ne sont modifiables que ligne par ligne dans le tableau.</div>
                <div style={S.field}>
                  <label style={S.label}>Cotisation mensuelle future (MAD)</label>
                  <input style={S.input} type="number" value={rcDefCotis} onChange={e=>applyFutureCotis(parseFloat(e.target.value)||0)} />
                </div>
                <div style={S.field}>
                  <label style={S.label}>Versement exceptionnel annuel futur (MAD)</label>
                  <input style={S.input} type="number" value={rcDefExcep} onChange={e=>applyFutureExcep(parseFloat(e.target.value)||0)} />
                </div>
              </div>
            </div>

            <div>
              <div style={S.card}>
                <div style={S.cardTitle}><span style={S.dot('#f97316')}></span>Décomposition</div>
                <DecompRow label="Épargne actuelle estimée" val={fmt(rcCurrent)} color="#f97316" bold />
                <DecompRow label="Capital arrêté capitalisé à aujourd’hui" val={fmt(rcNow.capVF)} />
                <DecompRow label="Cotisations encaissées à ce jour" val={fmt(rcNow.cotisVF)} />
                <DecompRow label="Vers. excep. encaissés à ce jour" val={fmt(rcNow.excepVF)} />
                <DecompRow label="Capital initial capitalisé" val={fmt(rcInitVF)} />
                <DecompRow label="Cotisations passées (VF)" val={fmt(pastCVF)} />
                <DecompRow label="Cotisations futures (VF)" val={fmt(futCVF)} />
                <DecompRow label="Vers. excep. passés (VF)" val={fmt(pastEVF)} />
                <DecompRow label="Vers. excep. futurs (VF)" val={fmt(futEVF)} />
                <DecompRow label="TOTAL" val={fmt(rcTotal)} color="#f97316" bold />
                <MiniChart series={annualSeries.years.map((y,i)=>({y,val:annualSeries.rcV[i]}))} color="#f97316" />
              </div>
            </div>
          </div>

          <div style={S.card}>
            <div style={S.cardTitle}><span style={S.dot('#f97316')}></span>Tableau mensuel détaillé</div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#64748b',marginBottom:8,flexWrap:'wrap',gap:4}}>
              <span>Passés : <b>{rcRows.filter(r=>r.pastLocked).length}</b> mois · Futurs : <b>{rcRows.filter(r=>!r.pastLocked).length}</b> mois</span>
              <span>Total brut : <b style={{color:'#f97316'}}>{fmt(rcRows.reduce((s,r)=>s+r.cotis+r.excep,0))}</b></span>
            </div>
            <div style={{maxHeight:280,overflowY:'auto'}}>
              <table style={S.table}>
                <thead><tr>
                  <th style={S.th}>Mois</th>
                  <th style={S.th}>Cotisation (MAD)</th>
                  <th style={S.th}>Vers. excep. (MAD)</th>
                </tr></thead>
                <tbody>
                  {rcRows.map((r,i)=>(
                    <tr key={`${r.y}-${r.m}`} style={{background:isNow(r.y,r.m)?'#f9731608':r.pastLocked?'#ffffff04':'transparent'}}>
                      <td style={S.td}>
                        <span style={{fontWeight:500,color:r.pastLocked?'#475569':'#e2e8f0'}}>
                          {MOIS[r.m]} {r.y}
                        </span>
                        {isNow(r.y,r.m) && <span style={{fontSize:9,color:'#f97316',marginLeft:6,fontWeight:700}}>↗</span>}
                        {r.pastLocked && !isNow(r.y,r.m) && <span style={{fontSize:9,color:'#475569',marginLeft:6}}>passé</span>}
                      </td>
                      <td style={S.td}>
                        <input style={{...S.tinput,color:r.pastLocked?'#475569':'#e2e8f0'}} type="number" value={r.cotis}
                          onChange={e=>updateRcRow(i,'cotis',parseFloat(e.target.value)||0)} />
                      </td>
                      <td style={S.td}>
                        <input style={{...S.tinput,color:r.pastLocked?'#475569':'#e2e8f0'}} type="number" value={r.excep}
                          onChange={e=>updateRcRow(i,'excep',parseFloat(e.target.value)||0)} />
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <div style={S.navRow}>
            <button style={S.btn('#64748b')} onClick={()=>setTab('horizon')}>← Horizon</button>
            <button style={S.btn('#22c55e')} onClick={()=>setTab('atlanta')}>Suivant — ATL →</button>
          </div>
        </div>
      )}

      {/* ── ATLANTA ── */}
      {tab==='atlanta' && (
        <div className="fade">
          <div style={S.resultBanner('#22c55e')}>
            <div><div style={S.rLbl}>Épargne actuelle estimée</div><div style={S.rVal('#4ade80')}>{fmt(atlCurrent)}</div></div>
            <div><div style={S.rLbl}>Capital ATL à la retraite</div><div style={S.rVal('#22c55e')}>{fmt(atlTotal)}</div></div>
            <div><div style={S.rLbl}>Rente mensuelle</div><div style={S.rVal('#4ade80')}>{fmt(atlPen)}/mois</div></div>
          </div>

          <div style={S.grid2}>
            <div>
              <div style={S.card}>
                <div style={S.cardTitle}><span style={S.dot('#22c55e')}></span>Capital & rendement</div>
                <div style={S.field}>
                  <label style={S.label}>Valeur à l’arrêté / capital de départ (MAD)</label>
                  <input style={S.input} type="number" value={atlCap} onChange={e=>setAtlCap(parseFloat(e.target.value)||0)} />
                </div>
                <Range min={0} max={12} step={0.25} value={atlRdmt} onChange={setAtlRdmt} color="#22c55e" label="Rendement annuel" />
              </div>
              <div style={S.card}>
                <div style={S.cardTitle}><span style={S.dot('#22c55e')}></span>Cotisation périodique</div>
                <div style={S.field}>
                  <label style={S.label}>Montant par versement (MAD)</label>

                  ['Vers. excep. ATL (brut)',fmt(atlVers.reduce((s,v)=>s+v.montant,0)),'#22c55e'],
                  ['Capital initial UC',fmt(ucCap),'#38bdf8'],
                  ['Cotisations UC (brut)',fmt(ucCotis*ucFreq*tBase),'#38bdf8'],
                  ['Vers. excep. UC (brut)',fmt(ucVers.reduce((s,v)=>s+v.montant,0)),'#38bdf8'],
                ].map(([l,v,c])=>(
                  <div key={l} style={S.sumRow}>
                    <span style={S.sumLbl}>{l}</span>
                    <span style={{fontWeight:500,color:c,fontSize:12}}>{v}</span>
                  </div>
                ))}
                <div style={{...S.sumRow,fontWeight:700,fontSize:14,borderBottom:'none',paddingTop:10}}>
                  <span style={{color:'#e2e8f0'}}>Total effort</span>
                  <span style={{color:'#a78bfa'}}>{fmt(
                    rcCap+rcRows.reduce((s,r)=>s+r.cotis+r.excep,0)+
                    atlCap+atlCotis*atlFreq*tBase+atlVers.reduce((s,v)=>s+v.montant,0)+
                    ucCap+ucCotis*ucFreq*tBase+ucVers.reduce((s,v)=>s+v.montant,0)
                  )}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      <div style={S.toast(toast.show)}>{toast.msg}</div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
